<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AegisDB · Memory Inspector</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%2314110E'/%3E%3Ctext x='12' y='17' font-family='monospace' font-size='13' font-weight='700' fill='%23C9A24B' text-anchor='middle'%3E%E2%96%8D%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Shared AegisDB visual identity (served by the bridge at /aegis.css). -->
<link rel="stylesheet" href="/aegis.css">
<style>
  /* Palette + type come from the shared identity (aegis.css). This file is only
     the inspector's layout, in the same ink/brass/paper ledger language. */
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.55 var(--body); background:var(--ink); color:var(--paper);
         -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }

  header { display:flex; align-items:center; gap:20px; padding:0 22px; height:58px;
           background:var(--ink); border-bottom:1px solid var(--line);
           position:sticky; top:0; z-index:5; }
  header h1 { font-family:var(--mono); font-size:14px; font-weight:600; letter-spacing:.02em;
              margin:0; color:var(--paper); display:flex; align-items:center; gap:9px; }
  header h1::before { content:"▍"; color:var(--brass); }
  header h1 .a { color:var(--brass); }
  .stats { display:flex; gap:26px; margin-left:auto; flex-wrap:wrap; }
  .stat { font-family:var(--mono); font-size:.64rem; letter-spacing:.07em;
          text-transform:uppercase; color:var(--dim); }
  .stat b { display:block; font-family:var(--body); font-size:16px; color:var(--paper);
            font-weight:600; letter-spacing:0; text-transform:none;
            font-variant-numeric:tabular-nums; margin-top:2px; }

  main { display:grid; grid-template-columns:288px 1fr; height:calc(100vh - 58px); }
  aside { padding:20px; border-right:1px solid var(--line); background:var(--ink-2); overflow:auto; }
  aside label { display:block; font-family:var(--mono); font-size:.64rem; letter-spacing:.07em;
                text-transform:uppercase; color:var(--dim); margin:16px 0 5px; }
  aside input, aside select { width:100%; padding:8px 10px; border:1px solid var(--line);
                border-radius:var(--radius); background:var(--ink-3); color:var(--paper); font:inherit; }
  aside input::placeholder { color:var(--dim-2); }
  .modes { display:flex; gap:6px; margin-bottom:6px; }
  .modes button { flex:1; padding:8px; border:1px solid var(--line); background:transparent;
                  color:var(--dim); border-radius:var(--radius); cursor:pointer;
                  font-family:var(--mono); font-size:.78rem; }
  .modes button.on { background:var(--ink-3); color:var(--brass); border-color:var(--brass); }
  .go { margin-top:18px; width:100%; padding:10px; border:0; border-radius:var(--radius);
        background:var(--brass); color:var(--ink); font-family:var(--mono); font-weight:600; cursor:pointer; }
  .go:hover { background:var(--brass-hi); }
  .hint { font-size:.78rem; color:var(--dim-2); margin-top:12px; line-height:1.5; }

  section.results { overflow:auto; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:10px 16px; border-bottom:1px solid var(--line);
           font-size:13.5px; vertical-align:top; }
  th { position:sticky; top:0; background:var(--ink-2); z-index:1; color:var(--dim);
       font-family:var(--mono); font-size:.64rem; font-weight:500; letter-spacing:.08em;
       text-transform:uppercase; }
  tbody tr { cursor:pointer; }
  tbody tr:hover { background:var(--ink-2); }
  td.id { font-family:var(--mono); color:var(--dim); font-size:.8rem; }
  td.data { max-width:520px; }
  td.score { font-family:var(--mono); color:var(--brass); font-variant-numeric:tabular-nums; }
  .chip { display:inline-block; background:var(--ink-3); color:var(--dim); border:1px solid var(--line);
          border-radius:var(--radius); padding:1px 7px; font-family:var(--mono); font-size:.7rem; margin:0 5px 3px 0; }
  .type { font-family:var(--mono); text-transform:uppercase; font-size:.62rem; letter-spacing:.06em; font-weight:600; }
  .type.semantic { color:var(--semantic); }
  .type.episodic { color:var(--episodic); }
  .type.working  { color:var(--working); }
  .empty { padding:48px; text-align:center; color:var(--dim); font-family:var(--mono); font-size:.85rem; }

  /* detail drawer */
  .drawer { position:fixed; top:0; right:0; width:min(480px,100%); height:100%; background:var(--ink-2);
            border-left:1px solid var(--line); box-shadow:-16px 0 40px rgba(0,0,0,.45);
            transform:translateX(100%); transition:transform .18s ease; overflow:auto; z-index:10; }
  .drawer.open { transform:none; }
  .drawer .dh { display:flex; align-items:center; gap:10px; padding:16px 20px; border-bottom:1px solid var(--line);
                position:sticky; top:0; background:var(--ink-2); font-family:var(--mono); }
  .drawer .dh .x { margin-left:auto; cursor:pointer; color:var(--dim); font-size:22px; line-height:1; border:0; background:none; }
  .drawer .dh .x:hover { color:var(--paper); }
  .drawer .body { padding:20px; }
  .kv { display:grid; grid-template-columns:104px 1fr; gap:7px 14px; margin-bottom:18px; font-size:13px; }
  .kv .k { font-family:var(--mono); font-size:.68rem; text-transform:uppercase; letter-spacing:.05em; color:var(--dim); padding-top:2px; }
  .kv .v { word-break:break-word; color:var(--paper); font-variant-numeric:tabular-nums; }
  .breakdown { background:var(--ink-3); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:18px; }
  .breakdown h3 { margin:0 0 12px; font-family:var(--mono); font-size:.64rem; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
  .bar { margin:9px 0; }
  .bar .lab { display:flex; justify-content:space-between; font-family:var(--mono); font-size:.72rem; color:var(--dim); margin-bottom:4px; }
  .bar .lab :last-child { color:var(--paper); }
  .bar .track { height:6px; background:var(--ink); border:1px solid var(--line); border-radius:2px; overflow:hidden; }
  .bar .fill { height:100%; }
  .formula { font-family:var(--mono); font-size:.72rem; color:var(--dim); margin-top:12px; padding-top:12px; border-top:1px dashed var(--line); }
  .formula b { color:var(--brass); }
  .edit label { display:block; font-family:var(--mono); font-size:.64rem; text-transform:uppercase; letter-spacing:.05em; color:var(--dim); margin:14px 0 5px; }
  .edit input, .edit textarea { width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:var(--radius);
             background:var(--ink); color:var(--paper); font:inherit; }
  .edit textarea { min-height:76px; resize:vertical; }
  .actions { display:flex; gap:10px; margin-top:20px; }
  .actions button { flex:1; padding:10px; border-radius:var(--radius); border:0; font-family:var(--mono); font-weight:600; cursor:pointer; }
  .save { background:var(--brass); color:var(--ink); }
  .save:hover { background:var(--brass-hi); }
  .del { background:transparent; color:var(--danger); border:1px solid var(--danger)!important; }
  .del:hover { background:var(--danger); color:var(--paper); }
  .toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink-3);
           color:var(--paper); border:1px solid var(--line); padding:11px 20px; border-radius:var(--radius);
           font-family:var(--mono); font-size:.8rem; opacity:0; transition:opacity .2s; pointer-events:none; z-index:20; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <h1><span class="a">Aegis</span>DB · Memory Inspector</h1>
  <div class="stats" id="stats"></div>
</header>
<main>
  <aside>
    <div class="modes">
      <button id="mBrowse" class="on" onclick="setMode('browse')">Browse</button>
      <button id="mSemantic" onclick="setMode('semantic')">Semantic</button>
    </div>
    <div id="semBox" style="display:none">
      <label>Query text</label>
      <input id="q" placeholder="what should surface?" onkeydown="if(event.key==='Enter')run()">
      <div class="hint" id="embHint"></div>
    </div>
    <label>Namespace (agent_id)</label>
    <input id="ns" placeholder="(all)">
    <label>Type</label>
    <select id="type"><option value="">(any)</option><option>semantic</option><option>episodic</option><option>working</option></select>
    <label>Tags (comma-separated)</label>
    <input id="tags" placeholder="e.g. deploy,ops">
    <label>Match</label>
    <select id="match"><option value="all">all</option><option value="any">any</option></select>
    <label>Limit (top_k)</label>
    <input id="topk" type="number" value="50" min="1" max="1000">
    <button class="go" onclick="run()">Search</button>
    <div class="hint">Rows are clickable — open one to see its provenance, the ranking breakdown (semantic), and to edit or delete it.</div>
  </aside>
  <section class="results" id="results"><div class="empty">Run a search to list memories.</div></section>
</main>

<div class="drawer" id="drawer">
  <div class="dh"><b>Memory</b> <span id="dId" class="chip"></span><button class="x" onclick="closeDrawer()">×</button></div>
  <div class="body" id="dbody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
let MODE = "browse", CFG = {}, LAST = [];

async function api(path, payload) {
  const r = await fetch(path, {method:"POST", headers:{"Content-Type":"application/json"},
                              body: JSON.stringify(payload)});
  return r.json();
}
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800); }
function esc(s){ return (s??"").toString().replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function setMode(m){
  MODE=m;
  document.getElementById("mBrowse").classList.toggle("on", m==="browse");
  document.getElementById("mSemantic").classList.toggle("on", m==="semantic");
  document.getElementById("semBox").style.display = m==="semantic" ? "" : "none";
}

async function loadConfig(){
  CFG = await (await fetch("/api/config")).json();
  document.getElementById("embHint").textContent =
    CFG.embedder==="none" ? "⚠ bridge started with --embedder none; semantic search disabled"
                          : `embedder: ${CFG.embedder} · dim ${CFG.embedding_dim} (must match the stored vectors)`;
}
async function loadStats(){
  const r = await api("/api/query", {operation:"stats"});
  if(!r.ok){ return; }
  const mem = r.memory||{}; const idx = r.indexes||{};
  const el = document.getElementById("stats");
  const fmtB = b => b>1e6 ? (b/1e6).toFixed(1)+" MB" : b>1e3 ? (b/1e3).toFixed(0)+" KB" : (b||0)+" B";
  el.innerHTML = [
    ["records", r.records], ["tombstones", r.tombstones],
    ["semantic", idx.semantic ?? "–"], ["tags", idx.tags ?? "–"],
    ["index RAM", fmtB(mem.index_bytes_total)], ["phase", r.phase],
  ].map(([k,v])=>`<div class="stat">${k}<b>${v}</b></div>`).join("");
}

async function run(){
  const topk = Math.max(1, Math.min(1000, +document.getElementById("topk").value||50));
  const ns = document.getElementById("ns").value.trim();
  const type = document.getElementById("type").value;
  const tags = document.getElementById("tags").value.split(",").map(s=>s.trim()).filter(Boolean);
  const match = document.getElementById("match").value;
  const req = {operation:"search", top_k:topk, include_embeddings:false};
  if(ns) req.agent_id = ns;
  if(type) req.type = type;
  if(tags.length){ req.tags = tags; req.match = match; }

  if(MODE==="semantic"){
    const text = document.getElementById("q").value.trim();
    if(!text){ toast("enter a query"); return; }
    if(CFG.embedder==="none"){ toast("semantic disabled (no embedder)"); return; }
    const e = await api("/api/embed", {text});
    if(e.error){ toast(e.error); return; }
    req.embedding = e.embedding;
    req.explain = true;
  } else {
    req.start_time = 0; req.end_time = 9999999999999; // browse = time scan over all
  }
  const r = await api("/api/query", req);
  if(!r.ok){ toast(r.error?.code || "search failed"); render([]); return; }
  LAST = r.records || [];
  render(LAST);
}

function render(recs){
  const el = document.getElementById("results");
  if(!recs.length){ el.innerHTML = `<div class="empty">No memories matched.</div>`; return; }
  const sem = MODE==="semantic";
  const rows = recs.map((rec,i)=>{
    const tags = (rec.tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join("");
    const score = sem && rec.explain ? `<td class="score">${rec.explain.score.toFixed(3)}</td>` : (sem?`<td></td>`:"");
    return `<tr onclick="openDetail(${i})">
      <td class="id">${rec.id}</td>
      <td><span class="type ${esc(rec.type)}">${esc(rec.type)}</span></td>
      <td class="data">${esc((rec.data||"").slice(0,140))}${(rec.data||"").length>140?"…":""}<div>${tags}</div></td>
      ${score}
    </tr>`;
  }).join("");
  el.innerHTML = `<table><thead><tr><th>id</th><th>type</th><th>memory</th>${sem?"<th>score</th>":""}</tr></thead><tbody>${rows}</tbody></table>`;
}

function bar(label, val, max, color){
  const pct = Math.max(0, Math.min(100, (val/max)*100));
  return `<div class="bar"><div class="lab"><span>${label}</span><span>${val.toFixed(3)}</span></div>
    <div class="track"><div class="fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}

function openDetail(i){
  const rec = LAST[i];
  const d = document.getElementById("drawer");
  document.getElementById("dId").textContent = "#"+rec.id;
  const ts = t => t ? new Date(+t).toISOString().replace("T"," ").replace(".000Z"," UTC") : "–";
  let html = `<div class="kv">
    <div class="k">type</div><div class="v"><span class="type ${esc(rec.type)}">${esc(rec.type)}</span></div>
    <div class="k">created</div><div class="v">${ts(rec.created)}</div>
    <div class="k">updated</div><div class="v">${ts(rec.updated)}</div>
    ${rec.agent_id?`<div class="k">namespace</div><div class="v">${esc(rec.agent_id)}</div>`:""}
    <div class="k">importance</div><div class="v">${rec.importance ?? "–"}</div>
    <div class="k">confidence</div><div class="v">${rec.confidence ?? "–"}</div>
    ${rec.expires_at?`<div class="k">expires</div><div class="v">${ts(rec.expires_at)}</div>`:""}
    ${(rec.relationships&&rec.relationships.length)?`<div class="k">relations</div><div class="v">${rec.relationships.map(r=>`${esc(r.kind||"→")} #${r.to_id}`).join(", ")}</div>`:""}
  </div>`;

  if(rec.explain){
    const e = rec.explain;
    html += `<div class="breakdown"><h3>Why this ranked here</h3>`;
    if(e.semantic){
      html += bar("similarity (cosine)", e.similarity, 1, "var(--semantic)");
      html += bar("weight (imp × conf)", e.weight, 1, "var(--working)");
      html += bar("recency factor", e.recency_factor, 1, "var(--episodic)");
      html += `<div class="formula">score = weight × similarity × recency = <b>${e.score.toFixed(4)}</b></div>`;
    } else {
      html += `<div class="formula">non-semantic result — ordered by time, not score</div>`;
    }
    html += `</div>`;
  }

  const editable = rec.type==="semantic";
  html += `<div class="edit">
    <label>data ${editable?"":"(read-only — only semantic memories are editable)"}</label>
    <textarea id="eData" ${editable?"":"disabled"}>${esc(rec.data||"")}</textarea>
    <label>importance</label><input id="eImp" type="number" step="0.05" min="0" max="1" value="${rec.importance ?? ""}" ${editable?"":"disabled"}>
    <label>confidence</label><input id="eConf" type="number" step="0.05" min="0" max="1" value="${rec.confidence ?? ""}" ${editable?"":"disabled"}>
    <label>tags (comma-separated)</label><input id="eTags" value="${esc((rec.tags||[]).join(", "))}" ${editable?"":"disabled"}>
    <div class="actions">
      ${editable?`<button class="save" onclick="saveRec(${rec.id})">Save</button>`:""}
      <button class="del" onclick="delRec(${rec.id})">Delete</button>
    </div>
  </div>`;
  document.getElementById("dbody").innerHTML = html;
  d.classList.add("open");
}
function closeDrawer(){ document.getElementById("drawer").classList.remove("open"); }

async function saveRec(id){
  const req = {operation:"update", id,
    data: document.getElementById("eData").value,
    importance: parseFloat(document.getElementById("eImp").value),
    confidence: parseFloat(document.getElementById("eConf").value),
    tags: document.getElementById("eTags").value.split(",").map(s=>s.trim()).filter(Boolean)};
  const r = await api("/api/query", req);
  if(r.ok){ toast("saved"); closeDrawer(); await loadStats(); run(); }
  else toast(r.error?.code || "update failed");
}
async function delRec(id){
  if(!confirm("Delete memory #"+id+"? This writes a tombstone.")) return;
  const r = await api("/api/query", {operation:"delete", id});
  if(r.ok){ toast("deleted"); closeDrawer(); await loadStats(); run(); }
  else toast(r.error?.code || "delete failed");
}

(async ()=>{ await loadConfig(); await loadStats(); })();
</script>
</body>
</html>
