name: Publish Docker image

# Publishes multi-arch images to GitHub Container Registry (ghcr.io). Public
# packages on a public repo are free to store and pull, and Actions minutes are
# free for public repositories. Pull requests build the image (without pushing)
# so a broken Dockerfile is caught before merge.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'Dockerfile'
      - 'CMakeLists.txt'
      - 'src/**'
      - 'include/**'
      - 'third_party/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # No login (and no push) for pull requests — they only validate the build.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # arm64 builds under emulation, so keep PRs to amd64 for speed and
          # publish both architectures on main/tags.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max