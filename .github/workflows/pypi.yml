name: Publish aegis-mcp to PyPI

# Builds and publishes the Claude Code integration package (integrations/
# claude-code) to PyPI on every `v*` tag, so teammates can run it with no clone
# via `uvx aegis-mcp`. Uses PyPI Trusted Publishing (OIDC) — no API token.
#
# One-time setup on PyPI: add a Trusted Publisher for project `aegis-mcp` with
#   owner=d4n-larsson, repo=aegisdb, workflow=pypi.yml, environment=pypi.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build sdist + wheel
        working-directory: integrations/claude-code
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: integrations/claude-code/dist