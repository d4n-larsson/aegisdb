name: Publish aegisdb-mcp to PyPI

# Builds and publishes the Claude Code integration package (integrations/
# claude-code) to PyPI on every `v*` tag, so teammates can run it with no clone
# via `uvx aegisdb-mcp`. Uses PyPI Trusted Publishing (OIDC) — no API token.
#
# One-time setup on PyPI: add a Trusted Publisher for project `aegisdb-mcp` with
#   owner=d4n-larsson, repo=aegisdb, workflow=pypi.yml, environment=pypi.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Resolve version from tag (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build sdist + wheel
        working-directory: integrations/claude-code
        # PRETEND_VERSION pins the build to the tag, so the artifact version
        # always matches the release (e.g. v0.3.1 -> 0.3.1).
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: integrations/claude-code/dist