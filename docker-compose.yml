services:
  aegisdb:
    build: .
    image: aegisdb:latest
    container_name: aegisdb
    ports:
      - "9470:9470"
    volumes:
      # Named volume keeps memory durable across container restarts.
      - aegis-data:/data
    restart: unless-stopped
    # Override the default flags here. The wire protocol carries no encryption
    # and tokens travel in plaintext, so enable auth only behind a trusted
    # network / TLS-terminating proxy.
    command:
      - "--data-dir"
      - "/data"
      - "--port"
      - "9470"
      - "--log-level"
      - "debug"
      # Pin the vector length to match the Claude Code MCP integration
      # (AEGIS_EMBEDDING_MODE=local, all-MiniLM-L6-v2 => 384). Keep these in sync.
      - "--embedding-dim"
      - "384"
      # - "--auth-token-file"
      # - "/data/tokens.txt"

volumes:
  aegis-data: