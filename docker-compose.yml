# AegisDB service.
#
# Configuration is driven by an optional .env file (copy .env.example -> .env).
# Every value has a sane default, so `docker compose up` works with no .env.
# The service is configured by CLI flags; this file interpolates the .env values
# into them. Anything not exposed as a named var below can be passed verbatim via
# AEGIS_EXTRA_ARGS (e.g. auth, --io-threads, ANN tuning).
services:
  aegisdb:
    # No explicit `image:` tag: Compose builds a project-scoped image from the
    # Dockerfile instead of reusing a hand-tagged/pulled `aegisdb:latest`, which
    # could be stale (built before newer flags existed). After changing source,
    # rebuild with `docker compose up -d --build`.
    build: .
    container_name: aegisdb
    ports:
      # host_ip:host_port:container_port. Publishes on loopback only by default:
      # the wire protocol is unauthenticated + plaintext out of the box, so it
      # must not be reachable off-box until you enable auth (AEGIS_EXTRA_ARGS)
      # and/or a TLS proxy. Set AEGIS_BIND=0.0.0.0 to expose it deliberately.
      # AEGIS_HOST_PORT changes only the published host port.
      - "${AEGIS_BIND:-127.0.0.1}:${AEGIS_HOST_PORT:-9470}:${AEGIS_PORT:-9470}"
    volumes:
      # Named volume keeps memory durable across container restarts.
      - aegis-data:/data
      # To enable auth, drop a token file beside the data and add
      # `--auth-token-file /data/tokens.txt` to AEGIS_EXTRA_ARGS:
      # - ./tokens.txt:/data/tokens.txt:ro
    restart: unless-stopped
    # Give the server time to flush the log and write its checkpoint on SIGTERM
    # (docker compose stop/down) before it is force-killed.
    stop_grace_period: ${AEGIS_STOP_GRACE:-30s}
    # The wire protocol carries no encryption and tokens travel in plaintext, so
    # enable auth (via AEGIS_EXTRA_ARGS) only behind a trusted network or a
    # TLS-terminating proxy. Keep --embedding-dim in sync with every client (the
    # Claude Code MCP integration defaults to 384).
    command: >
      --data-dir /data
      --port ${AEGIS_PORT:-9470}
      --embedding-dim ${AEGIS_EMBEDDING_DIM:-384}
      --phase ${AEGIS_PHASE:-4}
      --log-level ${AEGIS_LOG_LEVEL:-info}
      --durability ${AEGIS_DURABILITY:-interval}
      --checkpoint-sec ${AEGIS_CHECKPOINT_SEC:-60}
      --compact-sec ${AEGIS_COMPACT_SEC:-300}
      --tenant-max-records ${AEGIS_TENANT_MAX_RECORDS:-0}
      --tenant-max-bytes ${AEGIS_TENANT_MAX_BYTES:-0}
      --tenant-rate-qps ${AEGIS_TENANT_RATE_QPS:-0}
      ${AEGIS_EXTRA_ARGS:-}
    # Liveness via the binary's built-in probe; tracks AEGIS_PORT so it stays
    # correct when the port is overridden (the Dockerfile default hardcodes 9470).
    healthcheck:
      test: ["CMD", "aegisdb", "--health-check", "--port", "${AEGIS_PORT:-9470}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Bound container log growth (the server logs to stderr).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Resource limits are intentionally unset: AegisDB holds its indexes in RAM,
    # so memory scales with the dataset and a too-low cap will OOM-kill live
    # memories. Set them deliberately for your data size, e.g.:
    # deploy:
    #   resources:
    #     limits:
    #       memory: ${AEGIS_MEM_LIMIT:-1g}
    #       cpus: "${AEGIS_CPUS:-2}"

  # Off-box backups (opt-in): `docker compose --profile backup up`. Loops
  # scripts/aegis-backup.sh — takes a consistent online snapshot, tarballs it to
  # the host ./backups dir, and (if AEGIS_BACKUP_UPLOAD_CMD is set) ships it to
  # remote storage. Restart + the durable volume survive a crash; this survives
  # losing the box. A named-profile service does not start on a plain `up`.
  backup:
    profiles: ["backup"]
    image: debian:stable-slim
    container_name: aegisdb-backup
    depends_on:
      aegisdb:
        condition: service_healthy
    volumes:
      - aegis-data:/data                          # shared with the server (snapshots land here)
      - ./backups:/backups                        # host dir: tarballs land off the volume
      - ./scripts/aegis-backup.sh:/usr/local/bin/aegis-backup.sh:ro
    environment:
      AEGIS_HOST: aegisdb
      AEGIS_PORT: "${AEGIS_PORT:-9470}"
      AEGIS_DATA_DIR: /data
      AEGIS_BACKUP_DIR: /backups
      AEGIS_AUTH_TOKEN: "${AEGIS_AUTH_TOKEN:-}"    # admin token if auth is on
      AEGIS_BACKUP_UPLOAD_CMD: "${AEGIS_BACKUP_UPLOAD_CMD:-}"  # e.g. 'rclone copy {} remote:aegis'
      AEGIS_BACKUP_RETAIN: "${AEGIS_BACKUP_RETAIN:-7}"
    restart: unless-stopped
    # Snapshot on an interval (default daily). For genuine off-box storage set
    # AEGIS_BACKUP_UPLOAD_CMD; without it, tarballs stay on the host ./backups.
    entrypoint: ["bash", "-c"]
    command:
      - 'while true; do aegis-backup.sh || echo "backup failed (will retry)"; sleep "${AEGIS_BACKUP_INTERVAL:-86400}"; done'

  # Background summarization (opt-in): `docker compose --profile summarize up`.
  # Loops `aegisdb-summarize` on an interval, distilling clusters of aging,
  # low-value memories into semantic facts (see docs/summarization-design.md).
  # OFF unless AEGIS_SUMMARY_MODE names a real backend and its key is provided;
  # with the default `none` it connects, finds the provider disabled, and exits
  # non-zero each pass. In a container use `anthropic`/`openai` (the `claude-code`
  # backend needs the `claude` CLI, which isn't in this image). Preview without
  # writing: `docker compose run --rm --entrypoint aegisdb-summarize summarize --dry-run`.
  summarize:
    profiles: ["summarize"]
    build:
      context: ./integrations/claude-code
      args:
        # Bake in the backend SDK extra (see integrations/claude-code/Dockerfile).
        EXTRAS: "${AEGIS_SUMMARY_EXTRAS:-[anthropic]}"
    container_name: aegisdb-summarize
    depends_on:
      aegisdb:
        condition: service_healthy
    environment:
      AEGIS_HOST: aegisdb
      AEGIS_PORT: "${AEGIS_PORT:-9470}"
      AEGIS_AUTH_TOKEN: "${AEGIS_AUTH_TOKEN:-}"    # required if the server enforces auth
      # MUST match the namespace your agents write under, or the pass summarizes
      # an empty namespace. Blank falls back to the container's cwd-derived name,
      # which is almost never what you want — set it.
      AEGIS_NAMESPACE: "${AEGIS_SUMMARY_NAMESPACE:-}"
      AEGIS_SUMMARY_MODE: "${AEGIS_SUMMARY_MODE:-none}"
      AEGIS_SUMMARY_MODEL: "${AEGIS_SUMMARY_MODEL:-}"
      AEGIS_SUMMARY_API_BASE: "${AEGIS_SUMMARY_API_BASE:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # Match the server's embedding dim so summaries are stored consistently;
      # `none` (default) writes summaries without vectors — tag/time recall still
      # works, but set the same backend as your MCP clients for semantic recall.
      AEGIS_EMBEDDING_MODE: "${AEGIS_EMBEDDING_MODE:-none}"
      AEGIS_EMBEDDING_DIMENSIONS: "${AEGIS_EMBEDDING_DIM:-384}"
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command:
      - 'while true; do aegisdb-summarize || echo "summarize failed (will retry)"; sleep "${AEGIS_SUMMARY_INTERVAL:-86400}"; done'

  # Prometheus exporter (opt-in). Scrapes the server's `stats` op and serves it
  # on /metrics for Prometheus.
  #   docker compose --profile metrics up      # exporter only (bring your own Prometheus)
  #   docker compose --profile monitoring up    # exporter + the bundled Prometheus below
  # In both profiles so `monitoring` can start the exporter it depends on without
  # also naming `metrics` (a dependency in a non-active profile is an error).
  # `stats` is admin-scoped, so set AEGIS_AUTH_TOKEN to an admin token when auth
  # is enabled — otherwise every scrape is UNAUTHORIZED and reports aegisdb_up 0.
  # Publishes on loopback by default (same posture as the server); set
  # AEGIS_METRICS_BIND=0.0.0.0 to expose it (e.g. to an off-box Prometheus).
  metrics:
    profiles: ["metrics", "monitoring"]
    build:
      context: ./integrations/prometheus-exporter
    container_name: aegisdb-metrics
    depends_on:
      aegisdb:
        condition: service_healthy
    ports:
      - "${AEGIS_METRICS_BIND:-127.0.0.1}:${AEGIS_METRICS_HOST_PORT:-9471}:${AEGIS_METRICS_PORT:-9471}"
    environment:
      AEGIS_HOST: aegisdb
      AEGIS_PORT: "${AEGIS_PORT:-9470}"
      AEGIS_AUTH_TOKEN: "${AEGIS_AUTH_TOKEN:-}"    # admin token if auth is on
      AEGIS_EXPORTER_PORT: "${AEGIS_METRICS_PORT:-9471}"
    restart: unless-stopped

  # Bundled Prometheus (opt-in): `docker compose --profile monitoring up`.
  # Runs on the compose network and scrapes the exporter by service name
  # (metrics:9471, see integrations/prometheus-exporter/prometheus.yml), so no
  # host networking or 127.0.0.1 juggling is needed. Already have a Prometheus?
  # Skip this and use `--profile metrics` with your own scrape target instead.
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: aegisdb-prometheus
    depends_on:
      - metrics
    ports:
      # Prometheus UI. Loopback-only by default; override AEGIS_PROM_BIND to expose.
      - "${AEGIS_PROM_BIND:-127.0.0.1}:${AEGIS_PROM_HOST_PORT:-9090}:9090"
    volumes:
      - ./integrations/prometheus-exporter/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  # Bundled Grafana (part of `--profile monitoring`). Auto-provisions the
  # Prometheus datasource + the AegisDB dashboard, and opens straight onto it —
  # anonymous viewing is on so it's a zero-login demo; log in as admin (see the
  # AEGIS_GRAFANA_* vars) to edit. UI on 127.0.0.1:3000 by default.
  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    container_name: aegisdb-grafana
    depends_on:
      - prometheus
    ports:
      - "${AEGIS_GRAFANA_BIND:-127.0.0.1}:${AEGIS_GRAFANA_HOST_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${AEGIS_GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${AEGIS_GRAFANA_PASSWORD:-admin}"
      # Zero-login viewing for demos/screenshots; editing still needs the admin login.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_DEFAULT_THEME: "dark"
      # Land on the AegisDB dashboard instead of the empty home page.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/aegisdb.json"
    volumes:
      - ./integrations/prometheus-exporter/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./integrations/prometheus-exporter/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

  # Memory inspector (opt-in): `docker compose --profile inspector up -d`, then
  # open http://127.0.0.1:8600/. A browser UI to browse/search memories, see why
  # each hit ranked (the search `explain` breakdown), and edit or delete them.
  # It is a tiny stdlib-Python HTTP->TCP bridge (no build) that proxies an
  # allow-listed set of ops to the server and serves the UI — the page cannot
  # speak the raw wire protocol itself, so it needs this. Loopback-only by
  # default (it hands out an authenticated proxy to the database); set
  # AEGIS_INSPECTOR_BIND=0.0.0.0 to expose it. Semantic search needs an embedder
  # matching the stored vectors — the default `subword` is for demo/eval data;
  # for a real corpus, browse/provenance/edit/delete work regardless.
  inspector:
    profiles: ["inspector"]
    image: python:3.12-slim
    container_name: aegisdb-inspector
    depends_on:
      aegisdb:
        condition: service_healthy
    ports:
      - "${AEGIS_INSPECTOR_BIND:-127.0.0.1}:${AEGIS_INSPECTOR_HOST_PORT:-8600}:8600"
    volumes:
      # The bridge is source-only (stdlib); mount it + the shared embedder module
      # it imports (../../eval) at the layout it expects. Read-only.
      - ./tools/inspector:/app/tools/inspector:ro
      - ./eval:/app/eval:ro
    environment:
      AEGIS_TOKEN: "${AEGIS_AUTH_TOKEN:-}"   # admin token if the server enforces auth
    command: >
      python3 /app/tools/inspector/bridge.py
      --aegis-host aegisdb --aegis-port ${AEGIS_PORT:-9470}
      --http-port 8600 --bind 0.0.0.0
      --embedding-dim ${AEGIS_EMBEDDING_DIM:-384}
    restart: unless-stopped

volumes:
  aegis-data:
  prometheus-data:
  grafana-data: