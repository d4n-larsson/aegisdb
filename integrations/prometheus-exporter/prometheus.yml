# Prometheus config for the bundled `monitoring` compose profile.
#
#   docker compose --profile monitoring up
#
# This Prometheus runs as a compose service on the same network as the exporter,
# so it scrapes the exporter by its service name (`metrics`), NOT 127.0.0.1 —
# inside a container, 127.0.0.1 is the container itself. Service-name DNS is what
# makes container-to-container scraping work without host networking.
#
# Scraping an exporter that runs OUTSIDE this compose project instead? Point the
# target at the reachable host:port (and give the exporter AEGIS_METRICS_BIND=
# 0.0.0.0 if Prometheus is off-box).
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: aegisdb
    static_configs:
      - targets: ['metrics:9471']