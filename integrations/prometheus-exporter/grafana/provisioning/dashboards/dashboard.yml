# Auto-load every dashboard JSON under the mounted dashboards directory.
apiVersion: 1
providers:
  - name: AegisDB
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false